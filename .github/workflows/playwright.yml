name: Allure Report Test

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      # ── Checkout main branch ─────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Setup Node ───────────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # ── Run Playwright tests ─────────────────────────────────────────────
      - name: Run Playwright tests
        run: npx playwright test
        continue-on-error: true

      # ✅ Install Allure v3
      - name: Install Allure v3 CLI
        run: |
          npm install -g allure@latest
          allure --version

      # ── Checkout gh-pages branch if exists ────────────────────────
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      # ── Copy previous history into new results ─────────────────
      - name: Copy Allure history
        run: |
          if [ -d "gh-pages/history" ]; then
            mkdir -p allure-results/history
            cp -r gh-pages/history/* allure-results/history/
          fi

      # ── Generate Allure v3 Report ─────────────────────────────────────
      - name: Generate Allure Report
        run: allure generate allure-results -o allure-report --name "Allure Report"

      # ── Inject Custom Branding (AFTER generate) ───────────────────────
      - name: Customize Allure UI
        if: always()
        run: |
          mkdir -p allure-report/plugins/custom-logo/
          cp allure-custom/AndDoneLogo.png allure-report/plugins/custom-logo/
          if [ -f "allure-report/styles.css" ]; then
            cat allure-custom/custom.css >> allure-report/styles.css
            cat allure-custom/custom-theme.css >> allure-report/styles.css
          fi

      # ── Deploy to GitHub Pages ────────────────────────────────────────
      - name: Deploy to gh-pages
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          cd allure-report
          touch .nojekyll
          git init
          git checkout -b gh-pages
          git add .
          git commit -m "Deploy Allure v3 report"
          git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} gh-pages

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report
          retention-days: 30

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results
          retention-days: 30

      - name: Upload Playwright Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-artifacts
          path: test-results
          retention-days: 30