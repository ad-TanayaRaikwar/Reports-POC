name: Allure Report Test

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # Cache node_modules
      - name: Cache Node
        uses: actions/cache@v3
        with:
          path: node_modules
          key: npm-${{ hashFiles('package-lock.json') }}

      # Cache Playwright browsers
      - name: Cache Playwright
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

  test:
    needs: setup
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Restore Node cache
        uses: actions/cache@v3
        with:
          path: node_modules
          key: npm-${{ hashFiles('package-lock.json') }}

      - name: Restore Playwright cache
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      # ── Run Playwright tests ──────────────────────────────────────────────
      - name: Run Playwright tests
        run: npx playwright test

      # # ── Debug: show generated files after test run ────────────────────────
      # - name: List generated directories
      #   if: always()
      #   run: |
      #     echo "── allure-results ──"
      #     ls -la allure-results || echo "allure-results not found"
      #     echo "── test-results ──"
      #     ls -la test-results || echo "test-results not found"
      #     echo "── my-report ──"
      #     ls -la my-report || echo "my-report not found"

      # ── Install Allure CLI ────────────────────────────────────────────────
      # - name: Install Allure CLI
      #   if: always()
      #   run: npm install -g allure-commandline --save-dev

      # ── Generate Allure HTML report from results ──────────────────────────
      # - name: Generate Allure Report
      #   if: always()
      #   run: allure generate allure-results --clean -o allure-report

      # ── Upload Allure HTML report ─────────────────────────────────────────
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/          # ✅ matches -o allure-report above
          retention-days: 30

      # ── Upload Allure raw results ─────────────────────────────────────────
      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/         # ✅ where allure-playwright writes results
          retention-days: 30

      # ── Upload Playwright trace/screenshot/video artifacts ────────────────
      - name: Upload Playwright Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-artifacts
          path: test-results/           # ✅ matches outputDir in playwright.config.ts
          retention-days: 30