name: Playwright Reports CI

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # -------------------------------------------------
      # Checkout
      # -------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -------------------------------------------------
      # Node Setup
      # -------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # -------------------------------------------------
      # Install Dependencies
      # -------------------------------------------------
      - name: Install Dependencies
        run: npm ci

      # -------------------------------------------------
      # Cache Playwright Browsers
      # -------------------------------------------------
      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      # -------------------------------------------------
      # Install Browsers
      # -------------------------------------------------
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # -------------------------------------------------
      # Restore Allure History
      # -------------------------------------------------
      - name: Restore Allure History
        uses: actions/cache@v4
        with:
          path: cached-history
          key: allure-history-${{ github.run_number }}
          restore-keys: |
            allure-history-

      # -------------------------------------------------
      # Clean Previous Reports
      # -------------------------------------------------
      - name: Clean Old Reports
        run: |
          rm -rf allure-results
          rm -rf allure-report
          rm -rf my-report
          rm -rf playwright-report
          rm -rf test-results
          rm -rf gh-pages-dir

      # -------------------------------------------------
      # Run Tests
      # -------------------------------------------------
      - name: Run Playwright Tests
        run: npx playwright test --workers=1 --retries=1
        continue-on-error: true

      # -------------------------------------------------
      # Add Allure Executor Metadata
      # -------------------------------------------------
      - name: Add Executor Info
        if: always()
        run: |
          mkdir -p allure-results
          cat <<EOF > allure-results/executor.json
          {
            "name": "GitHub Actions",
            "type": "github",
            "buildName": "Run #${{ github.run_number }}",
            "buildOrder": "${{ github.run_number }}",
            "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportName": "Allure Report",
            "reportUrl": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/allure/"
          }
          EOF

      # -------------------------------------------------
      # Restore History into Results
      # -------------------------------------------------
      - name: Restore History Into Allure Results
        if: always()
        run: |
          mkdir -p allure-results/history
          if [ -d "cached-history/history" ]; then
            cp -R cached-history/history/* allure-results/history/
          else
            echo "No previous history found."
          fi

      # -------------------------------------------------
      # Install Allure CLI
      # -------------------------------------------------
      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline@2.29.0

      # -------------------------------------------------
      # Generate Allure Report
      # -------------------------------------------------
      - name: Generate Allure Report
        if: always()
        run: allure generate allure-results -o allure-report --clean

      # -------------------------------------------------
      # Save History for Next Run
      # -------------------------------------------------
      - name: Save New History
        if: always()
        run: |
          mkdir -p cached-history
          cp -R allure-report/history cached-history/

      # -------------------------------------------------
      # Compare Allure vs Ortoni Report Sizes
      # -------------------------------------------------
      - name: Compare Report Sizes
        if: always()
        run: |
          node -e "
          const fs=require('fs');
          const path=require('path');

          function size(dir){
            if(!fs.existsSync(dir)) return 0;
            let total=0;
            for(const file of fs.readdirSync(dir)){
              const full=path.join(dir,file);
              const stat=fs.statSync(full);
              total += stat.isDirectory() ? size(full) : stat.size;
            }
            return total;
          }

          function mb(bytes){
            return (bytes / 1024 / 1024).toFixed(2);
          }

          const allure=size('./allure-report');
          const ortoni=size('./my-report');

          const winner =
            allure === 0 && ortoni === 0 ? 'No reports found'
            : allure < ortoni ? 'Allure (smaller)'
            : ortoni < allure ? 'Ortoni (smaller)'
            : 'Tie';

          console.log('====================================');
          console.log('Report Size Comparison');
          console.log('====================================');
          console.log('Allure Report Size: ' + mb(allure) + ' MB');
          console.log('Ortoni Report Size: ' + mb(ortoni) + ' MB');
          console.log('Winner: ' + winner);
          console.log('====================================');

          fs.writeFileSync(
            'report-comparison.txt',
            'Allure Report Size: ' + mb(allure) + ' MB\\n' +
            'Ortoni Report Size: ' + mb(ortoni) + ' MB\\n' +
            'Winner: ' + winner + '\\n'
          );
          "

      # -------------------------------------------------
      # Upload Comparison Result
      # -------------------------------------------------
      - name: Upload Comparison Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Report-Comparison
          path: report-comparison.txt
          retention-days: 7

      # -------------------------------------------------
      # Upload Playwright Report
      # -------------------------------------------------
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Playwright-Report
          path: playwright-report
          retention-days: 7

      # -------------------------------------------------
      # Upload Allure Report
      # -------------------------------------------------
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Allure-Report
          path: allure-report
          retention-days: 7

      # -------------------------------------------------
      # Upload Ortoni Report
      # -------------------------------------------------
      - name: Upload Ortoni Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Ortoni-Report
          path: my-report/
          retention-days: 7

      # -------------------------------------------------
      # Upload Test Results
      # -------------------------------------------------
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Test-Results
          path: test-results
          retention-days: 7

      # -------------------------------------------------
      # Prepare Hosted Reports
      # -------------------------------------------------
      - name: Prepare Hosted Reports
        if: always()
        run: |
          mkdir -p gh-pages-dir

          if [ -d "allure-report" ]; then cp -R allure-report gh-pages-dir/allure; fi
          if [ -d "my-report" ]; then cp -R my-report gh-pages-dir/ortoni; fi

          cat <<EOF > gh-pages-dir/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Test Execution Reports</title>
              <style>
                  body { font-family: system-ui, -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; background-color: #f8f9fa; color: #333; }
                  .container { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
                  h1 { margin-top: 0; color: #2c3e50; }
                  .btn-group { margin-top: 20px; display: flex; gap: 15px; justify-content: center; }
                  a { text-decoration: none; padding: 12px 24px; font-weight: 600; border-radius: 6px; transition: all 0.2s; }
                  .btn-allure { background: #3498db; color: white; }
                  .btn-allure:hover { background: #2980b9; }
                  .btn-ortoni { background: #8e44ad; color: white; }
                  .btn-ortoni:hover { background: #732d91; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>Test Automation Reports</h1>
                  <p>Select a reporting dashboard to view the latest test execution details.</p>
                  <div class="btn-group">
                      <a href="./allure/index.html" class="btn-allure">View Allure Report</a>
                      <a href="./ortoni/index.html" class="btn-ortoni">View Ortoni Report</a>
                  </div>
              </div>
          </body>
          </html>
          EOF

      # -------------------------------------------------
      # Deploy Reports
      # -------------------------------------------------
      - name: Deploy Reports to GH Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: gh-pages-dir