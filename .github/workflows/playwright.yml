name: Allure Report Test

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      # ── Checkout main branch ─────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Setup Node ───────────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # ── Run Playwright tests ─────────────────────────────────────────────
      - name: Run Playwright tests
        run: npx playwright test
        continue-on-error: true

      # ── Install Allure v3 CLI ─────────────────────────────────────────────
      - name: Install Allure v3 CLI
        run: |
          npm install -g allure@latest
          allure --version

      # ── Restore history.jsonl from gh-pages (v3 single-file history) ─────
      - name: Restore Allure history
        run: |
          git fetch origin gh-pages 2>/dev/null || echo "⚠️ gh-pages branch not found (first run)"
          if git show origin/gh-pages:test-history/allure-history.jsonl > /tmp/allure-history.jsonl 2>/dev/null; then
            mkdir -p test-history
            mv /tmp/allure-history.jsonl test-history/allure-history.jsonl
            echo "✅ History restored — $(wc -l < test-history/allure-history.jsonl) previous runs found"
          else
            echo "⚠️ No history file found — this is the first run"
          fi

      # ── Generate Allure v3 Report (reads + appends history.jsonl) ────────
      - name: Generate Allure Report
        run: |
          allure generate allure-results \
            -o allure-report \
            --name "Ally Portal Test Report" \
            --history-path ./test-history/allure-history.jsonl \
            --append-history \
            --history-limit 20

      # ── Copy updated history.jsonl into report folder for deployment ──────
      - name: Persist Allure history
        run: |
          if [ -f "test-history/allure-history.jsonl" ]; then
            mkdir -p allure-report/test-history
            cp test-history/allure-history.jsonl allure-report/test-history/allure-history.jsonl
            echo "✅ history.jsonl persisted — $(wc -l < test-history/allure-history.jsonl) total runs"
          else
            echo "⚠️ No history.jsonl to persist"
          fi

      # ── Inject Custom Branding (AFTER generate) ───────────────────────────
      - name: Customize Allure UI
        if: always()
        run: |
          mkdir -p allure-report/plugins/custom-logo/
          cp allure-custom/AndDoneLogo.png allure-report/plugins/custom-logo/
          if [ -f "allure-report/styles.css" ]; then
            cat allure-custom/custom.css >> allure-report/styles.css
            cat allure-custom/custom-theme.css >> allure-report/styles.css
          else
            echo "⚠️ styles.css not found — skipping CSS injection"
          fi

      # ── Deploy report + history.jsonl to gh-pages ─────────────────────────
      - name: Deploy to gh-pages
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          cd allure-report
          touch .nojekyll
          git init
          git checkout -b gh-pages
          git add .
          git commit -m "Deploy Allure v3 report with history"
          git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} gh-pages

      # ── Upload Artifacts ──────────────────────────────────────────────────
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report
          retention-days: 30

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results
          retention-days: 30

      - name: Upload Playwright Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-artifacts
          path: test-results
          retention-days: 30