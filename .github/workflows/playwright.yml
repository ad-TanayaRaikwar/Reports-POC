name: Allure Report Test

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      # ── Checkout main branch ─────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Setup Node ───────────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # ── Run Playwright tests ─────────────────────────────────────────────
      - name: Run Playwright tests
        run: npx playwright test
        continue-on-error: true

      # ── Setup Java (Required for Allure CLI) ─────────────────────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      # ============================================================
      # 🔥 ALLURE HISTORY SUPPORT
      # ============================================================

      # ── Checkout gh-pages branch if exists ─────────────────────
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      # ── Copy previous history into new results ─────────────────
      - name: Copy Allure history
        run: |
          if [ -d "gh-pages/history" ]; then
            mkdir -p allure-results/history
            cp -r gh-pages/history/* allure-results/history/
          fi

      # ── Inject Custom UI Branding ───────────────────────────────────────
      - name: Customize Allure UI
        if: always()
        run: |
          # 1. Create the destination folder for the logo to prevent copy errors
          mkdir -p allure-report/plugin/custom-logo/
          
          # 2. Copy the logo using the singular 'plugin' folder path
          cp allure-custom/AndDoneLogo.png allure-report/plugin/custom-logo/
          
          # 3. Inject the header CSS
          cat allure-custom/custom.css >> allure-report/styles.css
          
          # 4. Inject the custom theme CSS
          cat allure-custom/custom-theme.css >> allure-report/styles.css        
      #     cp allure-custom/AndDoneLogo.png allure-report/plugins/custom-logo/
      #     cat allure-custom/custom.css >> allure-report/styles.css

      # # ── Inject Modern Ortoni-style Theme ────────────────────────────────
      # - name: Apply Custom CSS Theme
      #   if: always()
      #   run: cat custom-theme.css >> allure-report/styles.css

      # ── Generate Allure Report (with history) ──────────────────
      - name: Generate Allure Report
        run: allure generate allure-results --clean -o allure-report

      # ============================================================
      # 🚀 DEPLOY TO GITHUB PAGES (gh-pages branch)
      # ============================================================

      - name: Deploy to gh-pages
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          cd allure-report
          touch .nojekyll

          git init
          git checkout -b gh-pages
          git add .
          git commit -m "Deploy Allure report with history"

          git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} gh-pages

      # ============================================================
      # 📦 Upload Artifacts (Optional but kept)
      # ============================================================

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report
          retention-days: 30

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results
          retention-days: 30

      - name: Upload Playwright Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-artifacts
          path: test-results
          retention-days: 30