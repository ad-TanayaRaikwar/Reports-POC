name: Allure Report Test

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test
        continue-on-error: true

      - name: Install Allure v3 CLI
        run: |
          npm install -g allure@latest
          allure --version

      # ── Restore history.jsonl from gh-pages ───────────────────
      - name: Restore Allure history
        run: |
          git fetch origin gh-pages 2>/dev/null || echo "First run — no gh-pages yet"
          if git show origin/gh-pages:allure-history/history.jsonl > /tmp/history.jsonl 2>/dev/null; then
            mkdir -p allure-history
            mv /tmp/history.jsonl allure-history/history.jsonl
            echo "Restored — $(wc -l < allure-history/history.jsonl) previous runs"
          else
            echo "No history yet — first run, Allure will create the file"
          fi

      # ── Generate report ───────────────────────────────────────
      - name: Generate Allure Report
        run: allure generate allure-results

      # ── Copy updated history.jsonl into report for deployment ─
      - name: Persist Allure history
        run: |
          if [ -f "allure-history/history.jsonl" ]; then
            mkdir -p allure-report/allure-history
            cp allure-history/history.jsonl allure-report/allure-history/history.jsonl
            echo "$(wc -l < allure-history/history.jsonl) total runs persisted"
          else
            echo "No history.jsonl found to persist"
          fi

      # ── STEP 4: Deploy report + history to gh-pages ───────────────────
      - name: Deploy to gh-pages
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          cd allure-report
          touch .nojekyll
          git init
          git checkout -b gh-pages
          git add .
          git commit -m "Deploy Allure v3 report with history"
          git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} gh-pages

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report
          retention-days: 30

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results
          retention-days: 30

      - name: Upload Playwright Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-artifacts
          path: test-results
          retention-days: 30