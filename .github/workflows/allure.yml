name: Allure + Ortoni Report Test

on:
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  test-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # -----------------------------------
      # Cache Playwright Browsers
      # -----------------------------------
      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-pw-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pw-

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # -----------------------------------
      # Restore Allure History
      # -----------------------------------
      - name: Restore previous execution history
        uses: actions/cache@v4
        with:
          path: cached-history
          key: allure-history-${{ github.run_number }}
          restore-keys: |
            allure-history-

      # -----------------------------------
      # Run Playwright Tests
      # -----------------------------------
      - name: Run Playwright Tests
        run: npx playwright test
        continue-on-error: true

      # -----------------------------------
      # Add Allure Executor Info
      # -----------------------------------
      - name: Add Executor Info
        if: always()
        run: |
          mkdir -p allure-results
          cat <<EOF > allure-results/executor.json
          {
            "name": "GitHub Actions",
            "type": "github",
            "buildName": "Playwright Run #${{ github.run_number }}",
            "buildOrder": "${{ github.run_number }}",
            "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportName": "Allure Report",
            "reportUrl": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          }
          EOF

      # -----------------------------------
      # Copy Allure History
      # -----------------------------------
      - name: Copy history to results
        if: always()
        run: |
          mkdir -p allure-results/history

          if [ -d "cached-history/history" ]; then
            cp -R cached-history/history/* allure-results/history/
          else
            echo "No previous history found."
          fi

      # -----------------------------------
      # Install Allure CLI
      # -----------------------------------
      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline@2.29.0

      # -----------------------------------
      # Generate Allure Report
      # -----------------------------------
      - name: Generate Allure Report
        if: always()
        run: allure generate ./allure-results -o ./allure-report --clean

      # -----------------------------------
      # Save Allure History
      # -----------------------------------
      - name: Save new history for cache
        if: always()
        run: |
          mkdir -p cached-history
          cp -R allure-report/history cached-history/

      # -----------------------------------
      # Upload Allure Report Artifact
      # -----------------------------------
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Allure-Report
          path: allure-report

      # -----------------------------------
      # Upload Ortoni Report Artifact
      # -----------------------------------
      - name: Upload Ortoni Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Ortoni-Report
          path: ortoni-report

      # -----------------------------------
      # Deploy Allure to GitHub Pages
      # -----------------------------------
      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report