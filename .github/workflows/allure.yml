name: Allure CI Test

on:
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  test-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci


      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-pw-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pw-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # -----------------------------------------------------------
      # 1. DOWNLOAD PREVIOUS HISTORY FROM CACHE
      # -----------------------------------------------------------
      - name: Restore previous Allure 2 history
        uses: actions/cache@v4
        with:
          path: cached-history
          key: allure-history-${{ github.run_number }}
          restore-keys: |
            allure-history-

      # -----------------------------------------------------------
      # 2. RUN TESTS (Generates the allure-results folder)
      # -----------------------------------------------------------
      - name: Run Playwright tests
        run: npx playwright test
        continue-on-error: true

      # -----------------------------------------------------------
      # 3. THE ALLURE 2 ROUTINE (Copy history -> results)
      # -----------------------------------------------------------
      - name: Copy history to results
        if: always()
        run: |
          # Ensure the destination directory exists
          mkdir -p allure-results/history
          
          # If we successfully downloaded previous history, copy it inside the results folder
          if [ -d "cached-history/history" ]; then
            cp -R cached-history/history/* allure-results/history/
            echo "Successfully copied previous history into allure-results!"
          else
            echo "No previous history found. This must be the first run."
          fi

      # -----------------------------------------------------------
      # 4. GENERATE NEW REPORT
      # -----------------------------------------------------------
      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline@^2.0.0

      - name: Generate Allure Report
        if: always()
        run: allure generate ./allure-results -o ./allure-report --clean

      # -----------------------------------------------------------
      # 5. SAVE NEW HISTORY FOR THE NEXT PIPELINE RUN
      # -----------------------------------------------------------
      - name: Save new history for cache
        if: always()
        run: |
          mkdir -p cached-history
          # Copy the newly generated history out of the report so the cache step can save it
          cp -R allure-report/history cached-history/

      # -----------------------------------------------------------
      # 6. DEPLOYMENT
      # -----------------------------------------------------------
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report