name: Allure Report

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: write # Required to push to gh-pages

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps

    # -----------------------------------------------------------
    # 1. SETUP & RESTORE HISTORY (Single Cache Step)
    # -----------------------------------------------------------
    - name: Create history directory
      run: mkdir -p .allure-history

    - name: Cache Allure history
      uses: actions/cache@v4
      with:
        path: .allure-history/history.jsonl
        key: allure-history-${{ github.run_number }}
        restore-keys: |
          allure-history-

    # -----------------------------------------------------------
    # 2. RUN TESTS
    # -----------------------------------------------------------
    - name: Execute tests
      run: npx playwright test --retries=2
      continue-on-error: true # Ensures we generate the report even if tests fail

    # -----------------------------------------------------------
    # 3. ADD METADATA & CATEGORIES
    # -----------------------------------------------------------
    - name: Create executor file
      if: always()
      run: |
        cat <<EOF > allure-results/executor.json
        {
          "name": "GitHub Actions",
          "type": "github",
          "buildName": "Run ${{ github.run_number }}",
          "buildOrder": ${{ github.run_number }},
          "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        }
        EOF

    - name: Add categories
      if: always()
      run: |
        cat <<EOF > allure-results/categories.json
        [
          {
            "name": "Assertion Failures",
            "matchedStatuses": ["failed"]
          },
          {
            "name": "Infrastructure Issues",
            "messageRegex": ".*timeout.*"
          },
          {
            "name": "Test Bugs",
            "messageRegex": ".*null.*"
          }
        ]
        EOF

    # -----------------------------------------------------------
    # 4. GENERATE & DEPLOY
    # -----------------------------------------------------------
    - name: Install Allure v3 CLI
      if: always()
      run: npm install -g allure@latest

    - name: Generate Allure Report
      if: always()
      # Clean single-line command. Relies on allure.config.js for the history path.
      run: allure generate ./allure-results --output ./allure-report

    - name: Upload report artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report

    - name: Deploy report
      if: always()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: allure-report