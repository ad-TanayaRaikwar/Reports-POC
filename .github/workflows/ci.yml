name: Allure Report CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout source code ──────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Setup Node.js ─────────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      # ── Install project dependencies ──────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Install Playwright browsers ───────────────────────────────────────
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      # ── Clean stale results before test run ───────────────────────────────
      - name: Clean allure-results
        run: rm -rf allure-results && mkdir -p allure-results

      # ── Run Playwright tests ──────────────────────────────────────────────
      - name: Run Playwright tests
        run: npx playwright test
        continue-on-error: true

      # ── Setup Java (required by Allure CLI) ───────────────────────────────
      - name: Setup Java
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── Install Allure CLI ────────────────────────────────────────────────
      - name: Install Allure CLI
        run: npm install -g allure-commandline

      # ── Generate Allure HTML report ───────────────────────────────────────
      - name: Generate Allure Report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      # ── Upload raw allure results ─────────────────────────────────────────
      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 20

      # ── Upload generated HTML report ──────────────────────────────────────
      - name: Upload Allure HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 20

      # ── Upload Playwright traces/screenshots on failure ───────────────────
      - name: Upload Playwright Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-artifacts
          path: test-results/
          if-no-files-found: ignore
          retention-days: 20

      # ── Write job summary with artifact links ─────────────────────────────
      - name: Write Job Summary
        if: always()
        run: |
          echo "## 🎭 Playwright + Allure Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Retention |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📊 \`allure-report\` – Full interactive HTML report | 20 days |" >> $GITHUB_STEP_SUMMARY
          echo "| 📁 \`allure-results\` – Raw results for re-processing | 20 days |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎭 \`playwright-artifacts\` – Traces, screenshots, videos | 20 days |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 👇 How to view the Allure report locally" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Download and unzip the \`allure-report\` artifact" >> $GITHUB_STEP_SUMMARY
          echo "2. Open a terminal inside the unzipped folder" >> $GITHUB_STEP_SUMMARY
          echo "3. Run one of the following commands:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Option A – Allure CLI (if installed)**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "allure open ." >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Option B – npx serve (no install needed)**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "npx serve ." >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "Then open http://localhost:3000 in your browser" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "> ⚠️ **Do not** double-click \`index.html\` directly — Allure requires an HTTP server to load correctly." >> $GITHUB_STEP_SUMMARY